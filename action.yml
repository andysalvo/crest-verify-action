name: 'Crest Verify'
description: 'Run Crest conformance verification on your endpoint or fixtures. Get a badge.'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  endpoint:
    description: 'URL to verify (e.g., https://your-service.com)'
    required: false
  matrix-id:
    description: 'Your matrix entry ID (e.g., cm-004). Required for badge updates.'
    required: false
  publish:
    description: 'Submit results to the Crest conformance matrix'
    required: false
    default: 'false'
  fail-on-error:
    description: 'Fail the workflow if verification fails'
    required: false
    default: 'true'
  comment:
    description: 'Post results as a PR comment'
    required: false
    default: 'true'

outputs:
  status:
    description: 'Verification result: pass, fail, error'
  result-json:
    description: 'Path to the result JSON file'
  badge-url:
    description: 'Badge URL for this entry'
  summary:
    description: 'Human-readable result summary'

runs:
  using: 'composite'
  steps:
    - name: Run Crest Verify
      id: verify
      shell: bash
      env:
        CREST_ENDPOINT: ${{ inputs.endpoint }}
        CREST_MATRIX_ID: ${{ inputs.matrix-id }}
        CREST_PUBLISH: ${{ inputs.publish }}
      run: |
        RESULT_FILE="${RUNNER_TEMP}/crest-result.json"

        if [ -z "$CREST_ENDPOINT" ]; then
          echo '{"status":"error","message":"No endpoint specified"}' > "$RESULT_FILE"
          echo "status=error" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Verify the endpoint is reachable and returns valid JSON
        HTTP_CODE=$(curl -s -o "${RESULT_FILE}.raw" -w "%{http_code}" --connect-timeout 10 --max-time 30 "$CREST_ENDPOINT" 2>/dev/null || echo "000")

        # Also check health endpoint if available
        HEALTH_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 "$CREST_ENDPOINT/health" 2>/dev/null || echo "000")

        # Determine status
        if [ "$HTTP_CODE" = "200" ] || [ "$HEALTH_CODE" = "200" ]; then
          STATUS="pass"
        elif [ "$HTTP_CODE" = "402" ]; then
          STATUS="pass"  # x402 payment challenge = valid endpoint
        elif [ "$HTTP_CODE" = "000" ]; then
          STATUS="fail"  # unreachable
        else
          STATUS="caution"
        fi

        # Build result envelope
        python3 << PYEOF
import json, os, datetime

raw_file = os.environ.get("RUNNER_TEMP", "/tmp") + "/crest-result.json.raw"
try:
    with open(raw_file) as f:
        raw = json.loads(f.read())
except:
    raw = None

envelope = {
    "schema_version": "crest.verify.result.v1",
    "status": "${STATUS}",
    "http_code": int("${HTTP_CODE}") if "${HTTP_CODE}".isdigit() else 0,
    "health_code": int("${HEALTH_CODE}") if "${HEALTH_CODE}".isdigit() else 0,
    "mode": "endpoint",
    "target": os.environ.get("CREST_ENDPOINT", ""),
    "matrix_id": os.environ.get("CREST_MATRIX_ID", ""),
    "repository": os.environ.get("GITHUB_REPOSITORY", ""),
    "sha": os.environ.get("GITHUB_SHA", "")[:8],
    "ref": os.environ.get("GITHUB_REF", ""),
    "run_id": os.environ.get("GITHUB_RUN_ID", ""),
    "checked_at": datetime.datetime.now(datetime.timezone.utc).isoformat(),
    "raw": raw,
}

out = os.environ.get("RUNNER_TEMP", "/tmp") + "/crest-result.json"
with open(out, "w") as f:
    json.dump(envelope, f, indent=2)
print(json.dumps(envelope, indent=2))
PYEOF

        echo "status=$STATUS" >> "$GITHUB_OUTPUT"
        echo "result-json=${RESULT_FILE}" >> "$GITHUB_OUTPUT"

        if [ -n "$CREST_MATRIX_ID" ]; then
          echo "badge-url=https://verify.crestsystems.ai/badge/${CREST_MATRIX_ID}.svg" >> "$GITHUB_OUTPUT"
        fi

        if [ "$STATUS" = "pass" ]; then
          echo "summary=Crest verification PASSED for ${CREST_ENDPOINT} (HTTP ${HTTP_CODE})" >> "$GITHUB_OUTPUT"
        else
          echo "summary=Crest verification ${STATUS} for ${CREST_ENDPOINT} (HTTP ${HTTP_CODE})" >> "$GITHUB_OUTPUT"
        fi

    - name: Write Step Summary
      shell: bash
      run: |
        STATUS="${{ steps.verify.outputs.status }}"
        ENDPOINT="${{ inputs.endpoint }}"
        MATRIX_ID="${{ inputs.matrix-id }}"
        BADGE_URL="${{ steps.verify.outputs.badge-url }}"

        if [ "$STATUS" = "pass" ]; then
          ICON="✅"
        elif [ "$STATUS" = "caution" ]; then
          ICON="⚠️"
        else
          ICON="❌"
        fi

        {
          echo "## ${ICON} Crest Verification"
          echo ""
          echo "| Field | Value |"
          echo "|-------|-------|"
          echo "| Endpoint | \`${ENDPOINT}\` |"
          echo "| Status | **${STATUS}** |"
          echo "| Matrix ID | ${MATRIX_ID:-none} |"
          if [ -n "$BADGE_URL" ]; then
            echo "| Badge | ![crest](${BADGE_URL}) |"
          fi
          echo "| Checked | $(date -u +%Y-%m-%dT%H:%M:%SZ) |"
          echo ""
          echo "[View full matrix](https://verify.crestsystems.ai/matrix)"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: PR Comment
      if: github.event_name == 'pull_request' && inputs.comment == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const status = '${{ steps.verify.outputs.status }}';
          const endpoint = '${{ inputs.endpoint }}';
          const badgeUrl = '${{ steps.verify.outputs.badge-url }}';
          const icon = (status === 'spend' || status === 'pass') ? '✅' : '❌';

          const body = `## ${icon} Crest Verification\n\n` +
            `**Endpoint:** \`${endpoint}\`\n` +
            `**Status:** ${status}\n` +
            (badgeUrl ? `**Badge:** ![crest](${badgeUrl})\n` : '') +
            `\n[View matrix](https://verify.crestsystems.ai/matrix)`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes('Crest Verification'));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Publish to Matrix
      if: inputs.publish == 'true'
      shell: bash
      run: |
        ENVELOPE="${RUNNER_TEMP}/crest-envelope.json"
        if [ -f "$ENVELOPE" ]; then
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d @"$ENVELOPE" \
            "https://verify.crestsystems.ai/api/submit" || true
        fi

    - name: Fail on Error
      if: inputs.fail-on-error == 'true'
      shell: bash
      run: |
        STATUS="${{ steps.verify.outputs.status }}"
        if [ "$STATUS" != "spend" ] && [ "$STATUS" != "pass" ] && [ "$STATUS" != "caution" ]; then
          echo "::error::Crest verification failed with status: $STATUS"
          exit 1
        fi
