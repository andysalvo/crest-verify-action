name: 'Crest Verify'
description: 'Run Crest conformance verification on your endpoint or fixtures. Get a badge.'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  endpoint:
    description: 'URL to verify (e.g., https://your-service.com)'
    required: false
  matrix-id:
    description: 'Your matrix entry ID (e.g., cm-004). Required for badge updates.'
    required: false
  publish:
    description: 'Submit results to the Crest conformance matrix'
    required: false
    default: 'false'
  fail-on-error:
    description: 'Fail the workflow if verification fails'
    required: false
    default: 'true'
  comment:
    description: 'Post results as a PR comment'
    required: false
    default: 'true'

outputs:
  status:
    description: 'Verification result: pass, fail, error'
  result-json:
    description: 'Path to the result JSON file'
  badge-url:
    description: 'Badge URL for this entry'
  summary:
    description: 'Human-readable result summary'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run Crest Verify
      id: verify
      shell: bash
      env:
        CREST_ENDPOINT: ${{ inputs.endpoint }}
        CREST_MATRIX_ID: ${{ inputs.matrix-id }}
        CREST_PUBLISH: ${{ inputs.publish }}
      run: |
        # Install and run the CLI
        npm install -g @crestdeploymentsystems/verify 2>/dev/null

        RESULT_FILE="${RUNNER_TEMP}/crest-result.json"

        if [ -n "$CREST_ENDPOINT" ]; then
          # Endpoint mode: verify a live URL
          npx @crestdeploymentsystems/verify "$CREST_ENDPOINT" --json > "$RESULT_FILE" 2>&1 || true
        else
          echo '{"error": "No endpoint specified. Set inputs.endpoint."}' > "$RESULT_FILE"
        fi

        # Parse result
        if command -v python3 &>/dev/null; then
          STATUS=$(python3 -c "
        import json, sys
        try:
            d = json.load(open('$RESULT_FILE'))
            j = d.get('judgment', d.get('status', 'unknown'))
            print(j.lower() if isinstance(j, str) else 'unknown')
        except:
            print('error')
        ")
        else
          STATUS="unknown"
        fi

        # Build the result envelope
        python3 << 'PYEOF'
        import json, os, datetime

        result_file = os.environ.get("RUNNER_TEMP", "/tmp") + "/crest-result.json"
        try:
            raw = json.load(open(result_file))
        except:
            raw = {"error": "failed to parse result"}

        envelope = {
            "schema_version": "crest.verify.result.v1",
            "status": "$STATUS",
            "mode": "endpoint" if os.environ.get("CREST_ENDPOINT") else "unknown",
            "target": os.environ.get("CREST_ENDPOINT", ""),
            "matrix_id": os.environ.get("CREST_MATRIX_ID", ""),
            "repository": os.environ.get("GITHUB_REPOSITORY", ""),
            "sha": os.environ.get("GITHUB_SHA", "")[:8],
            "ref": os.environ.get("GITHUB_REF", ""),
            "run_id": os.environ.get("GITHUB_RUN_ID", ""),
            "checked_at": datetime.datetime.now(datetime.timezone.utc).isoformat(),
            "raw": raw,
        }

        out = os.environ.get("RUNNER_TEMP", "/tmp") + "/crest-envelope.json"
        json.dump(envelope, open(out, "w"), indent=2)
        print(json.dumps(envelope, indent=2))
        PYEOF

        # Set outputs
        echo "status=$STATUS" >> "$GITHUB_OUTPUT"
        echo "result-json=${RUNNER_TEMP}/crest-envelope.json" >> "$GITHUB_OUTPUT"

        MATRIX_ID="${CREST_MATRIX_ID}"
        if [ -n "$MATRIX_ID" ]; then
          echo "badge-url=https://verify.crestsystems.ai/badge/${MATRIX_ID}.svg" >> "$GITHUB_OUTPUT"
        fi

        # Summary for passed/failed
        if [ "$STATUS" = "spend" ] || [ "$STATUS" = "pass" ]; then
          echo "summary=Crest verification PASSED for ${CREST_ENDPOINT}" >> "$GITHUB_OUTPUT"
        else
          echo "summary=Crest verification: ${STATUS} for ${CREST_ENDPOINT}" >> "$GITHUB_OUTPUT"
        fi

    - name: Write Step Summary
      shell: bash
      run: |
        STATUS="${{ steps.verify.outputs.status }}"
        ENDPOINT="${{ inputs.endpoint }}"
        MATRIX_ID="${{ inputs.matrix-id }}"
        BADGE_URL="${{ steps.verify.outputs.badge-url }}"

        if [ "$STATUS" = "spend" ] || [ "$STATUS" = "pass" ]; then
          ICON="✅"
        elif [ "$STATUS" = "caution" ]; then
          ICON="⚠️"
        else
          ICON="❌"
        fi

        cat >> "$GITHUB_STEP_SUMMARY" << EOF
        ## ${ICON} Crest Verification

        | Field | Value |
        |-------|-------|
        | Endpoint | \`${ENDPOINT}\` |
        | Status | **${STATUS}** |
        | Matrix ID | ${MATRIX_ID:-none} |
        | Badge | ${BADGE_URL:+![crest](${BADGE_URL})} |
        | Checked | $(date -u +%Y-%m-%dT%H:%M:%SZ) |

        [View full matrix](https://verify.crestsystems.ai/matrix)
        EOF

    - name: PR Comment
      if: github.event_name == 'pull_request' && inputs.comment == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const status = '${{ steps.verify.outputs.status }}';
          const endpoint = '${{ inputs.endpoint }}';
          const badgeUrl = '${{ steps.verify.outputs.badge-url }}';
          const icon = (status === 'spend' || status === 'pass') ? '✅' : '❌';

          const body = `## ${icon} Crest Verification\n\n` +
            `**Endpoint:** \`${endpoint}\`\n` +
            `**Status:** ${status}\n` +
            (badgeUrl ? `**Badge:** ![crest](${badgeUrl})\n` : '') +
            `\n[View matrix](https://verify.crestsystems.ai/matrix)`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes('Crest Verification'));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Publish to Matrix
      if: inputs.publish == 'true'
      shell: bash
      run: |
        ENVELOPE="${RUNNER_TEMP}/crest-envelope.json"
        if [ -f "$ENVELOPE" ]; then
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d @"$ENVELOPE" \
            "https://verify.crestsystems.ai/api/submit" || true
        fi

    - name: Fail on Error
      if: inputs.fail-on-error == 'true'
      shell: bash
      run: |
        STATUS="${{ steps.verify.outputs.status }}"
        if [ "$STATUS" != "spend" ] && [ "$STATUS" != "pass" ] && [ "$STATUS" != "caution" ]; then
          echo "::error::Crest verification failed with status: $STATUS"
          exit 1
        fi
