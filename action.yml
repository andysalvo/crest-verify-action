name: 'Crest Verify'
description: 'Run Crest conformance verification on your endpoint. Get a badge.'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  endpoint:
    description: 'URL to verify'
    required: true
  matrix-id:
    description: 'Your matrix entry ID (e.g., cm-004)'
    required: false
  publish:
    description: 'Submit results to the conformance matrix'
    required: false
    default: 'false'
  submit-key:
    description: 'Your Crest submit key (store as a GitHub secret)'
    required: false
  fail-on-error:
    description: 'Fail the workflow if verification fails'
    required: false
    default: 'true'
  comment:
    description: 'Post results as a PR comment'
    required: false
    default: 'true'

outputs:
  status:
    description: 'pass, fail, caution, or error'
  badge-url:
    description: 'Badge URL for your matrix entry'
  summary:
    description: 'Human-readable result'

runs:
  using: 'composite'
  steps:
    - name: Verify Endpoint
      id: verify
      shell: bash
      run: |
        ENDPOINT="${{ inputs.endpoint }}"
        MATRIX_ID="${{ inputs.matrix-id }}"

        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 30 "$ENDPOINT" 2>/dev/null || echo "000")
        HEALTH_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 "${ENDPOINT}/health" 2>/dev/null || echo "000")

        if [ "$HTTP_CODE" = "200" ] || [ "$HEALTH_CODE" = "200" ]; then
          STATUS="pass"
        elif [ "$HTTP_CODE" = "402" ]; then
          STATUS="pass"
        elif [ "$HTTP_CODE" = "000" ]; then
          STATUS="fail"
        else
          STATUS="caution"
        fi

        echo "status=$STATUS" >> "$GITHUB_OUTPUT"
        echo "http-code=$HTTP_CODE" >> "$GITHUB_OUTPUT"

        if [ -n "$MATRIX_ID" ]; then
          echo "badge-url=https://verify.crestsystems.ai/badge/${MATRIX_ID}.svg" >> "$GITHUB_OUTPUT"
        fi

        echo "summary=Crest: $STATUS ($ENDPOINT, HTTP $HTTP_CODE)" >> "$GITHUB_OUTPUT"

    - name: Step Summary
      shell: bash
      run: |
        STATUS="${{ steps.verify.outputs.status }}"
        ENDPOINT="${{ inputs.endpoint }}"
        MATRIX_ID="${{ inputs.matrix-id }}"
        BADGE="${{ steps.verify.outputs.badge-url }}"
        HTTP="${{ steps.verify.outputs.http-code }}"

        if [ "$STATUS" = "pass" ]; then ICON="✅"; elif [ "$STATUS" = "caution" ]; then ICON="⚠️"; else ICON="❌"; fi

        echo "## $ICON Crest Verification" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| | |" >> "$GITHUB_STEP_SUMMARY"
        echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
        echo "| Endpoint | \`$ENDPOINT\` |" >> "$GITHUB_STEP_SUMMARY"
        echo "| Status | **$STATUS** (HTTP $HTTP) |" >> "$GITHUB_STEP_SUMMARY"
        echo "| Matrix | ${MATRIX_ID:-not set} |" >> "$GITHUB_STEP_SUMMARY"
        if [ -n "$BADGE" ]; then echo "| Badge | ![crest]($BADGE) |" >> "$GITHUB_STEP_SUMMARY"; fi
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "[View matrix](https://verify.crestsystems.ai/matrix)" >> "$GITHUB_STEP_SUMMARY"

    - name: PR Comment
      if: github.event_name == 'pull_request' && inputs.comment == 'true'
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
      with:
        script: |
          const status = '${{ steps.verify.outputs.status }}';
          const endpoint = '${{ inputs.endpoint }}';
          const badge = '${{ steps.verify.outputs.badge-url }}';
          const icon = status === 'pass' ? '✅' : '❌';
          const body = `## ${icon} Crest Verification

**Endpoint:** \`${endpoint}\`
**Status:** ${status}
${badge ? `![crest](${badge})
` : ''}
[View matrix](https://verify.crestsystems.ai/matrix)`;
          const { data: comments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
          const existing = comments.find(c => c.body.includes('Crest Verification'));
          if (existing) {
            await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
          }

    - name: Publish to Matrix
      if: inputs.publish == 'true' && inputs.submit-key != ''
      shell: bash
      run: |
        STATUS="${{ steps.verify.outputs.status }}"
        MATRIX_ID="${{ inputs.matrix-id }}"
        SUBMIT_KEY="${{ inputs.submit-key }}"
        ENDPOINT="${{ inputs.endpoint }}"

        if [ -z "$MATRIX_ID" ] || [ -z "$SUBMIT_KEY" ]; then
          echo "Skipping publish: matrix-id or submit-key not set"
          exit 0
        fi

        RESULT=$(curl -s -w "
%{http_code}" -X POST \
          -H "Content-Type: application/json" \
          -H "X-Crest-Key: $SUBMIT_KEY" \
          -d "{\"matrix_id\":\"$MATRIX_ID\",\"status\":\"$STATUS\",\"repository\":\"$GITHUB_REPOSITORY\",\"sha\":\"${GITHUB_SHA:0:8}\",\"checked_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"target\":\"$ENDPOINT\"}" \
          https://verify.crestsystems.ai/api/submit)

        HTTP_CODE=$(echo "$RESULT" | tail -1)
        BODY=$(echo "$RESULT" | head -n -1)

        if [ "$HTTP_CODE" = "200" ]; then
          echo "Published to matrix: $BODY"
        else
          echo "::warning::Matrix publish failed (HTTP $HTTP_CODE): $BODY"
        fi

    - name: Fail Check
      if: inputs.fail-on-error == 'true'
      shell: bash
      run: |
        STATUS="${{ steps.verify.outputs.status }}"
        if [ "$STATUS" != "pass" ] && [ "$STATUS" != "caution" ]; then
          echo "::error::Crest verification failed: $STATUS"
          exit 1
        fi
